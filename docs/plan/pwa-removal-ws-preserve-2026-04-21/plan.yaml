tldr: |
  Remove service-worker/manifest wiring and Serwist dependencies from the frontend,
  add a temporary service-worker decommission routine for users who previously installed the app,
  update documentation to remove PWA claims while preserving WebSocket setup/usage instructions,
  and validate that ws.ts + useChat.ts + QueryPanel.tsx behavior remains unchanged.
open_questions:
  - question: How long should the decommission helper remain in production before final cleanup?
    context: Transitional unregister logic is required now, but lifecycle/retirement window is a product decision.
    type: decision_blocker
    affects: [T1, T5, T7]
