pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Service worker unregister step is omitted or broken, leaving stale cached shell for existing users.
      likelihood: medium
      impact: high
      mitigation: Implement and test explicit unregister + cache cleanup flow; verify in browser devtools and via scripted checks.
    - scenario: Removing PWA wiring accidentally removes or alters WebSocket initialization flow.
      likelihood: low
      impact: critical
      mitigation: Keep ws.ts/useChat.ts/QueryPanel.tsx behavior unchanged; run focused WS regression matrix after code changes.
    - scenario: Dependency cleanup leaves lockfile out of sync, breaking CI or local installs.
      likelihood: medium
      impact: medium
      mitigation: Regenerate lockfile with pnpm, run lint/unit checks, and verify dependency graph has no Serwist packages.
  assumptions:
    - Frontend runtime is Next.js App Router (16.x) and current SW registration is client-side via ServiceWorkerProvider.
    - Existing WebSocket endpoint contract remains /ws/chat and should not be modified in this objective.
    - Documentation source of truth for setup is frontend/SETUP.md; frontend/README.md may remain minimal unless explicit PWA claims are found.
implementation_specification:
  code_structure: |
    Client shell cleanup in app layout/provider layer; static artifact removal in public assets;
    dependency graph cleanup in package metadata/lockfile; documentation updates in frontend setup docs;
    WebSocket behavior verification through existing ws hook + chat UI integration.
  affected_areas:
    - frontend/src/app/layout.tsx
    - frontend/src/components/providers/ServiceWorkerProvider.tsx
    - frontend/src/components/providers/ServiceWorkerDecommissioner.tsx
    - frontend/public/sw.js
    - frontend/public/manifest.json
    - frontend/package.json
    - frontend/pnpm-lock.yaml
    - frontend/SETUP.md
    - frontend/README.md
    - frontend/src/lib/ws.ts
    - frontend/src/hooks/useChat.ts
    - frontend/src/components/chat/QueryPanel.tsx
  component_details:
    - component: App shell layout metadata and providers
      responsibility: Remove PWA manifest/mobile-web-app metadata and SW registration wiring; host temporary decommission hook.
      interfaces:
        - RootLayout(children)
      dependencies:
        - component: Service worker decommission client component
          relationship: invoked once on client to unregister legacy SW registrations
      integration_points:
        - Next.js app layout render path
        - browser navigator.serviceWorker + Cache Storage APIs
    - component: Dependency and build metadata
      responsibility: Remove Serwist runtime/build dependencies and keep lockfile/install reproducibility intact.
      interfaces:
        - pnpm install / pnpm lock synchronization
      dependencies:
        - component: package manager resolution
          relationship: resolves dependency graph after package.json change
      integration_points:
        - package.json dependencies
        - pnpm-lock.yaml snapshots
    - component: WebSocket chat pipeline
      responsibility: Preserve connection lifecycle and query send/receive handling during PWA teardown.
      interfaces:
        - getWSClient()/WebSocketClient
        - useChat() hook API
        - QueryPanel UI status/send flow
      dependencies:
        - component: FastAPI WebSocket endpoint /ws/chat
          relationship: bidirectional message contract unchanged
      integration_points:
        - frontend/src/lib/ws.ts
        - frontend/src/hooks/useChat.ts
        - frontend/src/components/chat/QueryPanel.tsx
