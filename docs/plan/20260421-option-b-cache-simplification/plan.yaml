plan_id: 20260421-option-b-cache-simplification
objective: >-
  Implement Architecture Option B from docs/HybridRAG_Architecture.md by applying
  Phase 1 blocking fixes first, then simplifying cache responsibilities around an
  authoritative L1 query cache, distributed corpus_version invalidation,
  thread-safe L2 stats exposure, layered /cache/stats reporting, regression
  protection, and observability hardening.
created_at: 2026-04-21T00:00:00Z
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 20
  risk_score: medium
tldr: |
  Option B should be executed as a phased backend refactor. Phase 1 lands three
  blockers first: truthful ttl_seconds reporting, add-path invalidation, and
  replacement of six placeholder integration tests. Phase 2 removes middleware
  response-data caching and shifts cache observability to an authoritative
  handler-driven contract. Phase 3 introduces a distributed corpus_version token
  with fail-open fallback and formalizes L2 as a node-local, thread-safe cache
  with explicit stats. Phase 4 converts /cache/stats to a layered schema. Final
  waves focus on regression coverage, rollout review, observability hardening,
  and backend documentation updates.
open_questions:
  - question: Should middleware telemetry preserve X-Cache or standardize on X-Cache-Status?
    context: >-
      docs/HybridRAG_Architecture.md phase text names X-Cache-Status, while the
      current implementation and tests assert X-Cache. The refactor should not
      ship an avoidable compatibility break without an explicit decision.
    type: decision_blocker
    affects: [OPTB-004, OPTB-009, OPTB-013]
  - question: Are there external dashboards or operators consuming the flat /cache/stats schema?
    context: >-
      No in-repo frontend or TypeScript consumer of /cache/stats was found, but
      the architecture blueprint flags schema-break risk for existing monitoring.
    type: research
    affects: [OPTB-008, OPTB-010, OPTB-011, OPTB-013]
  - question: Should Redis fallback in multi-instance deployments be allowed as degraded mode or treated as rollout-blocking?
    context: >-
      Option B explicitly fails open to local generation when Redis is
      unavailable, which preserves uptime but weakens distributed coherency.
    type: decision_blocker
    affects: [OPTB-005, OPTB-007, OPTB-011, OPTB-012, OPTB-013]
gaps:
  - description: External /cache/stats consumers are not visible in the repository.
    refinement_requests:
      - query: Identify dashboards, scripts, or operators that parse the current flat /cache/stats response.
        source_hint: docs/CACHE_DEPLOYMENT.md, deployment runbooks, monitoring configuration outside repo
  - description: Production expectations for Redis outage behavior are not documented.
    refinement_requests:
      - query: Confirm whether degraded local corpus_version fallback is acceptable in multi-instance environments.
        source_hint: docs/CACHE_DEPLOYMENT.md, ops runbooks, deployment roadmap
pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Layered /cache/stats schema ships without compatibility planning and breaks existing monitoring.
      likelihood: medium
      impact: medium
      mitigation: >-
        Gate rollout on a schema-consumer review, define a compatibility decision
        in OPTB-011, and document migration notes in OPTB-013.
    - scenario: Redis fallback activates silently, causing stale cross-instance responses while appearing healthy.
      likelihood: medium
      impact: critical
      mitigation: >-
        Expose fallback_active and redis_connected in backend_health, emit
        warning-level logs on fallback activation, and require explicit rollout
        guidance before completion.
    - scenario: Middleware simplification removes data caching but regresses cache-status headers or excluded-path behavior.
      likelihood: low
      impact: medium
      mitigation: >-
        Rewrite middleware tests against the approved observability contract and
        preserve end-to-end parity checks in integration/system tests.
    - scenario: Add/update invalidation changes create a thundering herd after corpus changes.
      likelihood: low
      impact: medium
      mitigation: >-
        Keep the distributed version token authoritative, clear only local cache
        state, and verify invalidation behavior under repeated requests in
        integration tests before observability hardening.
  assumptions:
    - Redis remains an optional but already-supported backend through hybrid_rag/cache.py.
    - Phase 1 fixes may ship in the same branch if they are not already merged elsewhere.
    - No frontend changes are required unless an out-of-repo consumer of /cache/stats is confirmed.
    - Shared retrieval parity across REST and WebSocket must be preserved throughout the refactor.
implementation_specification:
  code_structure: >-
    Keep cache ownership split across existing backend modules: api_middleware.py
    becomes observability-only, api.py owns authoritative L1 query caching plus
    corpus_version invalidation and /cache/stats composition, hybrid_rag/cache.py
    remains the backend abstraction and stats source for L1 storage, and
    hybrid_rag/retriever.py formalizes the node-local L2 embedding cache with
    thread-safe stats exposure. Regression coverage stays in the existing pytest
    suites rather than creating a new test harness.
  affected_areas:
    - docs/HybridRAG_Architecture.md
    - api.py
    - api_middleware.py
    - hybrid_rag/cache.py
    - hybrid_rag/retriever.py
    - tests/test_cache.py
    - tests/test_cache_integration.py
    - tests/test_query_cache_middleware.py
    - tests/test_embedding_cache.py
    - tests/test_api_shared_retrieval.py
    - tests/test_system_e2e.py
    - README.md
    - docs/API_INTEGRATION.md
    - docs/CACHE_DEPLOYMENT.md
  component_details:
    - component: QueryCacheMiddleware
      responsibility: >-
        Stop caching response bodies and act only as an observability layer that
        preserves excluded-path behavior and emits request-scoped cache status.
      interfaces:
        - HTTP middleware contract for POST /retrieve
        - Cache-status response header contract for REST responses
      dependencies:
        - component: _shared_retrieve_documents
          relationship: Consumes authoritative cache-hit/cache-miss outcome
      integration_points:
        - api_middleware.py dispatch flow
        - FastAPI middleware registration in api.py
        - tests/test_query_cache_middleware.py
    - component: Authoritative L1 query cache
      responsibility: >-
        Use _shared_retrieve_documents as the single query-cache path for REST
        and WebSocket flows, keyed by query, config fingerprint, rerank flag, and
        distributed corpus_version.
      interfaces:
        - Shared retrieval function signature in api.py
        - CacheBackend get/set/clear/stats contract
      dependencies:
        - component: corpus_version invalidation helper
          relationship: Supplies monotonic cache-key versioning
        - component: CacheBackend implementations
          relationship: Stores and reports L1 cache state
      integration_points:
        - api.py retrieval and ingest handlers
        - tests/test_api_shared_retrieval.py
        - tests/test_cache_integration.py
    - component: Distributed corpus_version invalidation
      responsibility: >-
        Replace process-local generation coupling with Redis-backed monotonic
        invalidation plus explicit degraded fallback behavior.
      interfaces:
        - _get_corpus_version() helper
        - Redis INCR/GET access path
        - backend_health fallback_active and redis_connected reporting
      dependencies:
        - component: RedisCache / Redis client path
          relationship: Provides the shared token store and health signals
      integration_points:
        - api.py config and ingest flows
        - tests/test_api_shared_retrieval.py
        - tests/test_system_e2e.py
    - component: L2 embedding cache
      responsibility: >-
        Stay node-local, become thread-safe, and expose stable stats for layered
        observability without changing retrieval semantics.
      interfaces:
        - HybridRetriever.embedding_cache_stats() property or equivalent public accessor
        - Layered l2_embedding_cache stats payload
      dependencies:
        - component: cachetools.LRUCache
          relationship: Underlying local cache store
        - component: threading.RLock
          relationship: Guards hit/miss bookkeeping and cache access
      integration_points:
        - hybrid_rag/retriever.py
        - tests/test_embedding_cache.py
        - api.py /cache/stats composition
    - component: Layered cache stats endpoint
      responsibility: >-
        Report L1 query cache, L2 embedding cache, and backend health in one
        fail-open endpoint suitable for operators and regression tests.
      interfaces:
        - GET /cache/stats response schema
        - Pydantic response models in api.py
      dependencies:
        - component: CacheBackend.stats()
          relationship: Supplies L1/backend values including ttl_seconds
        - component: HybridRetriever.embedding_cache_stats()
          relationship: Supplies node-local L2 values
      integration_points:
        - api.py
        - tests/test_cache_integration.py
        - tests/test_system_e2e.py
