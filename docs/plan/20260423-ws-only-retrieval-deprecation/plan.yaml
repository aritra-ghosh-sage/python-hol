plan_id: 20260423-ws-only-retrieval-deprecation
objective: >-
  Implement WS-only retrieval architecture by deprecating/removing HTTP retrieval
  endpoints in stages while preserving admin HTTP endpoints and keeping changes
  safe, observable, and reversible.
created_at: 2026-04-23T00:00:00Z
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 11
  risk_score: high
tldr: |
  Stage retrieval endpoint retirement with explicit gates:
  1) Immediately mark /retrieve and /retrieve-filtered deprecated/internal-only.
  2) Remove /retrieve-filtered first after dependency migration.
  3) Remove /retrieve only after tests/tooling/runbooks are WS-migrated.
  4) Keep admin HTTP endpoints only: /config, /documents, /cache/stats, /health.

  Key risk controls:
  - Observability split risk is handled by unifying WS and HTTP retrieval telemetry labels before endpoint removal.
  - WS cache-status visibility risk is handled by adding a WS-visible cache-state signal (payload field and/or status event contract).
  - Cache write-path duplication risk is handled by ensuring only shared retrieval cache writes remain once HTTP middleware path is removed.

  Rollback strategy:
  - Stage A rollback (after deprecation or /retrieve-filtered removal): re-enable removed route from tagged commit and restore docs/tests from prior gate tag.
  - Stage B rollback (after /retrieve removal): restore /retrieve route and middleware gate from pre-removal release tag; keep shared facade unchanged.
  - Operational rollback trigger: any regression in WS retrieval correctness, cache hit behavior, or admin endpoint health checks.

  Source basis:
  - api.py (HTTP routes + shared retrieval facade + WS handler)
  - api_middleware.py (POST /retrieve middleware and X-Cache behavior)
  - tests/test_api_shared_retrieval.py (REST/WS facade parity)
  - tests/test_ws_http_middleware_tradeoffs_e2e.py (observability split, WS cache visibility gap, duplicate write-path)
  - docs/API_INTEGRATION.md and docs/QUICK_START.md (HTTP retrieval docs)
open_questions:
  - question: Should WS response payload include explicit cache-status field, or should observability remain log-only?
    context: >-
      Existing tests call out that REST has X-Cache while WS has no cache-status field;
      adding payload status changes client contract.
    type: decision_blocker
    affects: [T03, T06, T08]
  - question: Is /documents/sources considered an admin endpoint to keep, or should it be retired with non-admin HTTP retrieval endpoints?
    context: >-
      Middleware exclusion defaults include /documents/sources, but target admin list explicitly names
      only /config, /documents, /cache/stats, /health.
    type: decision_blocker
    affects: [T09, T10]
  - question: Which internal tooling (if any) still calls POST /retrieve directly in CI/runbooks/scripts?
    context: >-
      Endpoint retirement order depends on eliminating hidden internal dependencies.
    type: decision_blocker
    affects: [T04, T06, T07, T08]
gaps:
  - description: Unknown inventory of non-test internal HTTP retrieval consumers.
    refinement_requests:
      - query: "Search scripts/docs/automation for '/retrieve' and '/retrieve-filtered' usage."
        source_hint: "tests/, docs/, implementation_docs/, quality/, shell scripts"
  - description: WS cache-status contract decision is unresolved.
    refinement_requests:
      - query: "Select WS cache visibility approach (payload field vs status event vs logs-only)."
        source_hint: "WS client consumers and API contract expectations"
pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Observability split causes false-negative alerting after HTTP endpoint removal.
      likelihood: medium
      impact: high
      mitigation: >-
        Add unified retrieval telemetry taxonomy before removals; validate dashboards/alerts against WS-only traffic in pre-removal gate.
    - scenario: WS clients lose cache transparency when HTTP X-Cache disappears.
      likelihood: high
      impact: medium
      mitigation: >-
        Introduce WS cache-status signal and verify via contract tests before removing /retrieve.
    - scenario: Duplicate cache writes (middleware + shared facade) collapse incorrectly and regress hit rate or consistency.
      likelihood: medium
      impact: critical
      mitigation: >-
        Remove duplicate write-path in controlled step; assert single write-path via e2e tests and cache stats checks.
  assumptions:
    - Shared retrieval facade remains the single retrieval engine for WS and any temporary HTTP path.
    - User-facing retrieval flow is WS chat only.
    - Endpoint removals can ship behind reversible release tags.
implementation_specification:
  code_structure: >-
    Use staged endpoint lifecycle: deprecate -> remove /retrieve-filtered -> migrate tests/tooling -> remove /retrieve ->
    narrow HTTP surface to admin endpoints only. Keep shared retrieval facade stable to reduce blast radius.
  affected_areas:
    - api.py
    - api_middleware.py
    - tests/
    - docs/
    - implementation_docs/ and runbooks referencing retrieval endpoints
  component_details:
    - component: HTTP retrieval endpoints
      responsibility: Temporary compatibility surface during migration only
      interfaces:
        - POST /retrieve (deprecated, then removed)
        - POST /retrieve-filtered (deprecated, then removed first)
      dependencies:
        - component: shared retrieval facade
          relationship: delegates retrieval operations
      integration_points:
        - OpenAPI docs
        - internal scripts/tests
    - component: WS retrieval chat flow
      responsibility: Primary retrieval path and long-term contract
      interfaces:
        - WS /ws/chat messages (status/results/error)
      dependencies:
        - component: shared retrieval facade
          relationship: retrieval execution + caching
      integration_points:
        - frontend chat
        - WS tests
    - component: QueryCacheMiddleware
      responsibility: HTTP-layer response caching for POST /retrieve
      interfaces:
        - X-Cache response metadata
      dependencies:
        - component: cache backend
          relationship: read/write L1 cache keys
      integration_points:
        - POST /retrieve only (to be removed with endpoint)
