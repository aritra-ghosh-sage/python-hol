            {name:'other_collection',count:7,missCount:14}
          ]
        - Mock getCollections to return both collections
        - Render, wait for load
        - Assert: store entry for 'other_collection' has missCount === 0

      Test D: stale-save warning shown when selected collection is stale
        - Seed store with knownCollections=[
            {name:'rag_collection',count:42,missCount:0},
            {name:'stale_col',count:0,missCount:15}
          ]
        - Mock getConfig to return baseConfig with collection_name='stale_col'
        - Mock getCollections to return only [{name:'rag_collection',count:42}]
        - Render, wait for load
        - Click "Save Settings" button
        - Assert: warning message text is visible in the DOM
        - Assert: apiClient.updateConfig was NOT called (vi.mocked check)

      All four tests must pass and must not pollute each other thanks to the
