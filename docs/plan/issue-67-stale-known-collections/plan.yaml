  # ─── Wave 2 ───────────────────────────────────────────────────────────────
  - id: task-02
    title: Rewrite mergeCollections with missCount tracking in settingsStore
    description: |
      File: frontend/src/stores/settingsStore.ts, lines 1-20 (full file).

      Changes required:
      1. Add module-level named constant before the create() call:
           export const STALE_THRESHOLD = 15;
         (exported so SettingsPanel can import and reuse it for filtering)

      2. Rewrite the mergeCollections action body:
         - Build a Map<string, CollectionInfo> from fresh[], setting missCount=0
           for every entry present in fresh.
         - Iterate get().knownCollections. For each entry:
           a. If the entry IS in fresh (byName.has(known.name)): already handled
              above (fresh entry wins, missCount=0).
           b. If the entry is NOT in fresh: carry it forward with
              missCount = (known.missCount ?? 0) + 1.
         - Overwrite set({ knownCollections: Array.from(byName.values()) }).

      The SettingsState interface does not change (no new exported actions).
      STALE_THRESHOLD is exported for SettingsPanel to import.

      Pseudocode for the new mergeCollections body:
        const byName = new Map(fresh.map(c => [c.name, { ...c, missCount: 0 }]));
        for (const known of get().knownCollections) {
          if (!byName.has(known.name)) {
            byName.set(known.name, {
              ...known,
              missCount: (known.missCount ?? 0) + 1,
            });
          }
        }
        set({ knownCollections: Array.from(byName.values()) });
    wave: 2
    agent: gem-implementer
    prototype: false
    covers: ["frontend/src/stores/settingsStore.ts"]
    priority: high
    status: pending
    flags:
      flaky: false
      retries_used: 0
    dependencies: [task-01]
    conflicts_with: []
    context_files:
      - path: frontend/src/stores/settingsStore.ts
        description: Full store file (lines 1-20); mergeCollections action at lines 11-19
      - path: frontend/src/lib/types.ts
        description: CollectionInfo interface with missCount (after task-01)
    estimated_effort: small
    estimated_files: 1
    estimated_lines: 20
    focus_area: store logic
    verification:
      - "STALE_THRESHOLD constant is exported and equals 15"
      - "After one merge with fresh=[A], known=[A,B]: A.missCount=0, B.missCount=1"
      - >
        After 15 merges missing B: B.missCount=15 (equal to STALE_THRESHOLD)
      - "pnpm tsc --noEmit passes"
    acceptance_criteria:
      - "STALE_THRESHOLD = 15 exported from settingsStore.ts"
      - >
        mergeCollections resets missCount=0 for entries present in fresh and
        increments missCount for entries absent from fresh
      - "No mutation of existing CollectionInfo objects (use spread)"
      - "pnpm tsc --noEmit passes"
    failure_modes:
      - scenario: >
          Fresh entries overwrite known entries that have additional fields,
          causing missCount to be lost on re-appearance if spread is wrong.
        likelihood: low
        impact: medium
        mitigation: >
          Spread fresh entry first, then set missCount: 0 explicitly so the
          fresh API data wins on all other fields and missCount is always reset.
      - scenario: >
          Exporting STALE_THRESHOLD causes a circular import if SettingsPanel
          imports from settingsStore but settingsStore also imports from types.ts.
        likelihood: low
        impact: low
        mitigation: >
          The import chain is types.ts <- settingsStore.ts <- SettingsPanel.tsx,
          which is acyclic. No circular import risk.
    tech_stack: [TypeScript, Zustand]
    test_coverage: null

  # ─── Wave 3 ───────────────────────────────────────────────────────────────
  - id: task-03
    title: Filter stale entries from dropdown and add stale-save warning in SettingsPanel
    description: |
      File: frontend/src/components/settings/SettingsPanel.tsx.

      Two sub-changes:

      --- Sub-change A: Dropdown filtering (lines 346-358) ---

      Import STALE_THRESHOLD from '@/stores/settingsStore' at the top of the
      file (add to existing import line).

      Inside the IIFE that builds dropdown options (lines 346-358):
      1. Keep the active-collection fallback injection unchanged
         (lines 348-349 check config.collection_name not in collectionMap).
         This runs BEFORE the filter so the active collection is never hidden.
      2. After injection, add a filter step:
           const visibleCollections = Array.from(collectionMap.values())
             .filter(col => (col.missCount ?? 0) < STALE_THRESHOLD);
      3. Map visibleCollections (not all collectionMap values) to <option> elements.

      The sort by name is preserved on visibleCollections.

      --- Sub-change B: Stale warning in handleSave (lines 73-104) ---

      At the top of handleSave, before the try block, add a stale check:
        const selectedEntry = knownCollections.find(
          c => c.name === config.collection_name
        );
        const isStaleSelection =
          selectedEntry !== undefined &&
          (selectedEntry.missCount ?? 0) >= STALE_THRESHOLD;

      If isStaleSelection is true, call setMessage with a warning:
        setMessage({
          type: "error",
          text: "Warning: the selected collection may no longer exist on the server. Saving may recreate it as an empty collection.",
        });
      Then return early (do not proceed with the API call).

      NOTE: If the open question about blocking vs. non-blocking is resolved
      as "non-blocking", remove the early return and let the save proceed with
      the warning banner visible. The default implementation uses a blocking
      early return (safest).
