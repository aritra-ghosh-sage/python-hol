  # ─── Wave 1 ───────────────────────────────────────────────────────────────
  - id: task-01
    title: Add missCount field to CollectionInfo interface
    description: |
      File: frontend/src/lib/types.ts, lines 48-51.

      Current definition:
        export interface CollectionInfo {
          name: string;
          count: number;
        }

      Change: add `missCount?: number` as a third field.

      The field is optional on the interface so that existing callers (API
      response parsing, test fixtures) that omit it remain valid TypeScript.
      The store always sets it explicitly during mergeCollections, so runtime
      values are never undefined after the first merge.

      No other file changes in this task.
