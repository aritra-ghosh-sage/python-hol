plan_id: issue-67-stale-known-collections
objective: >
  Fix stale knownCollections entries in settingsStore by implementing per-entry
  miss counting (Option A). Collections absent from the API for 15 consecutive
  merges are soft-hidden from the UI dropdown. The active collection is always
  shown regardless of missCount. A stale-collection warning is surfaced in the
  save flow when the selected collection_name is hidden.
created_at: "2026-04-28"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 4
  risk_score: low

tldr: |
  Four sequential frontend changes across three files, plus a verification pass.
  Wave 1: extend the CollectionInfo type. Wave 2: rewrite mergeCollections in
  the Zustand store with STALE_THRESHOLD logic. Wave 3: filter the dropdown and
  add a stale-save warning in SettingsPanel. Wave 4: extend SettingsPanel tests
  with store reset + four new stale-behaviour scenarios. Wave 5: confirm all
  three done-criteria commands pass (pnpm lint, pnpm test:unit, pnpm build).

open_questions:
  - question: >
      Should the stale warning in the save flow be a blocking modal or an inline
      non-blocking banner?
    context: >
      The issue description says "show a warning" but does not specify whether
      the user should be prevented from saving or merely alerted. The current
      message system (setMessage) is non-blocking. Defaulting to non-blocking
      inline warning is safest; a modal can be added in a follow-up.
    type: nice_to_know
    affects: [task-03]

  - question: >
      Should missCount be persisted across browser sessions (localStorage /
      zustand-persist) or reset on page reload?
    context: >
      The issue description targets 15 consecutive panel opens. If the store is
      ephemeral (not persisted), the counter resets on every page reload, making
      STALE_THRESHOLD=15 effectively "15 opens in one browser session". This is
      consistent with the existing additive-merge design (also session-scoped).
    type: decision_blocker
    affects: [task-02]

gaps: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: >
        Active collection name injected at SettingsPanel lines 348-349 is
        accidentally filtered out by the stale filter, leaving the dropdown
        empty or showing an incorrect value.
      likelihood: medium
      impact: high
      mitigation: >
        The filter must check missCount AFTER the active-collection injection
        block. The injection creates a fresh entry with missCount=0 (not stale),
        so it will never be filtered. Verify in tests that the active collection
        always appears in the dropdown even when its store entry has
        missCount >= STALE_THRESHOLD.

    - scenario: >
        Test ordering pollution: a prior test leaves knownCollections in a
        non-empty state, causing stale-count assertions to fail intermittently.
      likelihood: high
      impact: medium
      mitigation: >
        Add useSettingsStore.setState({ knownCollections: [] }) to the
        beforeEach block in SettingsPanel.test.tsx. This is the primary fix
        identified in the research findings.

    - scenario: >
        TypeScript strict-mode rejects using the optional missCount field
        without a null-check, causing pnpm tsc --noEmit to fail in the build.
      likelihood: low
      impact: medium
      mitigation: >
        Use nullish coalescing in all missCount reads:
        (known.missCount ?? 0) + 1. The interface declares missCount?: number
        so the store sets it explicitly on every merge, keeping reads safe.

  assumptions:
    - The store is NOT persisted across page reloads (session-scoped).
    - GET /collections always returns at most 1 entry (the active collection).
    - STALE_THRESHOLD=15 is the agreed threshold; no env-var override is needed.
    - The stale warning in the save flow is non-blocking (inline banner).
    - CollectionInfo is used only in frontend code; no backend serialisation impact.

implementation_specification:
  code_structure: >
    All changes are contained in the frontend package at
    frontend/src/{lib/types.ts, stores/settingsStore.ts,
    components/settings/SettingsPanel.tsx,
    components/settings/SettingsPanel.test.tsx}.
    No new files are created. No backend changes are required.
  affected_areas:
    - frontend/src/lib/types.ts
    - frontend/src/stores/settingsStore.ts
    - frontend/src/components/settings/SettingsPanel.tsx
    - frontend/src/components/settings/SettingsPanel.test.tsx
  component_details:
    - component: CollectionInfo (types.ts)
      responsibility: >
        Shared TypeScript interface for collection metadata. Gains an optional
        missCount field that the store always populates.
      interfaces:
        - "missCount?: number  // undefined on first creation, 0+ after first merge"
      dependencies: []
      integration_points:
        - settingsStore.ts uses CollectionInfo as the knownCollections element type
        - SettingsPanel.tsx reads CollectionInfo entries from the store

    - component: settingsStore (settingsStore.ts)
      responsibility: >
        Zustand store holding knownCollections. mergeCollections is rewritten to:
        (1) define STALE_THRESHOLD=15 as a module-level named constant,
        (2) reset missCount=0 for entries present in fresh,
        (3) increment missCount for entries absent from fresh,
        (4) write the updated array back to state.
      interfaces:
        - "STALE_THRESHOLD: 15 (module-level constant)"
        - "mergeCollections(fresh: CollectionInfo[]): void"
        - "knownCollections: CollectionInfo[]"
      dependencies:
        - component: CollectionInfo
          relationship: element type of knownCollections array
      integration_points:
        - SettingsPanel.tsx calls mergeCollections on mount and after Create & Switch
        - SettingsPanel.tsx reads knownCollections to build the dropdown

    - component: SettingsPanel (SettingsPanel.tsx)
      responsibility: >
        Settings UI component. The collection dropdown is updated to filter out
        entries with missCount >= STALE_THRESHOLD before rendering options.
        The active-collection fallback injection (lines 348-349) is preserved and
        runs before the filter to guarantee the current collection always appears.
        handleSave gains a pre-save stale check: if the selected collection_name
        matches a stale entry, an inline warning banner is shown.
      interfaces:
        - "visibleCollections: CollectionInfo[] (derived, not stored)"
        - "isStaleSelection: boolean (derived in handleSave)"
      dependencies:
        - component: settingsStore
          relationship: consumes knownCollections and mergeCollections
        - component: CollectionInfo
          relationship: reads missCount field for filtering
      integration_points:
        - mergeCollections called at lines 33 and 411

    - component: SettingsPanel.test.tsx
      responsibility: >
        Vitest test suite. beforeEach gains a store reset. Four new test cases
        cover: (1) missCount increments for absent collections, (2) stale entries
        hidden from dropdown at threshold, (3) reappearing collections reset to 0,
        (4) stale warning shown when saving with a hidden collection.
      interfaces: []
      dependencies:
        - component: SettingsPanel
          relationship: renders and asserts on component output
        - component: settingsStore
          relationship: direct state manipulation via useSettingsStore.setState
      integration_points:
        - vi.mock('@/lib/api') stubs apiClient

