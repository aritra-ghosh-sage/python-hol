  - id: T2-test-startup-paths
    title: Add tests for initialize_retriever() existing-collection and new-collection startup paths
    description: |
      Create tests/test_initialize_retriever_startup.py with two test classes:

      TestInitializeRetrieverExistingCollection
        - Monkeypatch list_existing_collections to return [_config.collection_name]
        - Monkeypatch open_collection to return a MagicMock collection
        - Monkeypatch initialize_vector_db to a MagicMock
        - Call api.initialize_retriever()
        - Assert open_collection called exactly once with correct args
        - Assert initialize_vector_db never called
        - Assert api._retriever is not None

      TestInitializeRetrieverNewCollection
        - Monkeypatch list_existing_collections to return []
        - Monkeypatch open_collection to a MagicMock
        - Monkeypatch initialize_vector_db to return a MagicMock collection
        - Monkeypatch get_sample_documents to return a small list
        - Call api.initialize_retriever()
        - Assert initialize_vector_db called exactly once with correct args
        - Assert open_collection never called
        - Assert api._retriever is not None

      Use monkeypatch (pytest) to patch the names as they appear in api.py
      (i.e. patch "api.list_existing_collections", "api.open_collection", etc.).
      Reset api._retriever = None and api._config = None before each test, then
      patch HybridRetrieverConfig or set api._config to a known HybridRetrieverConfig()
      so the expected collection_name is deterministic. Use tmp_path fixture for
      KNOWLEDGE_DB_DIRECTORY to avoid touching the real DB.

      TestInitializeRetrieverOpenCollectionError
        - Monkeypatch list_existing_collections to return [_config.collection_name]
          (so the existing-collection branch is taken)
        - Monkeypatch open_collection to raise VectorDBError
        - Call api.initialize_retriever() inside pytest.raises(VectorDBError)
        - Assert the exception propagates

      No real ChromaDB or sentence-transformer model should be loaded by these tests.
      Setup time must remain <10 ms.
