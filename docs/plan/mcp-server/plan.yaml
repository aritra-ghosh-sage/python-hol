    contract:
      inputs:
        - "None (unauthenticated — Prometheus scrape must not require bearer token)"
      outputs:
        - name: metrics text
          type: "text/plain; version=0.0.4"
          metrics:
            - "mcp_requests_total{tool, status}"
            - "mcp_request_duration_seconds{tool}"
            - "mcp_cache_operations_total{operation: hit|miss|error}"
            - "mcp_retrieval_duration_seconds"
      invariants:
        - "Metrics are incremented atomically"
        - "Counter labels are stable (no high-cardinality labels)"
