          description: "OTLP endpoint URL; tracing disabled when absent."
        - name: OTEL_SERVICE_NAME
          type: "env var (string, default: hybrid-rag-mcp)"
      outputs:
        - "Spans exported to OTLP endpoint with operation names and status codes"
