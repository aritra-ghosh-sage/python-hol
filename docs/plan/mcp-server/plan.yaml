# ─────────────────────────────────────────────────────────────────────────────
# RISK ANALYSIS
# ─────────────────────────────────────────────────────────────────────────────

risks:

  - id: R1
    title: "FastMCP API does not expose ASGI middleware hooks"
    probability: medium
    impact: high
    affected_tasks: [T1-AUTH, T1-RATELIMIT, T2-HEALTH, T2-METRICS]
    description: >
      FastMCP's public API may not provide a stable way to inject Starlette
      middleware or add custom HTTP routes (/health, /metrics).  If the
      internal ASGI app is not accessible, auth and observability tasks
      require either a wrapper process or waiting for upstream SDK support.
    mitigation: >
      1. Inspect FastMCP source for .app property before coding.
      2. If not available, wrap mcp_server.py in a Starlette app that mounts
         FastMCP as a sub-application alongside /health and /metrics routes.
      3. Pin mcp SDK version in pyproject.toml to avoid unexpected breakage.
    contingency: >
      If wrapping is needed, add a single wrapper module (mcp_http_app.py,
      ≤ 150 lines) that composes FastMCP + auth middleware + health/metrics
      routes without touching mcp_server.py core logic.

  - id: R2
    title: "ChromaDB persistence conflicts in multi-replica Kubernetes deployment"
    probability: high
    impact: high
    affected_tasks: [T3-K8S]
    description: >
      Running multiple MCP server pods against a shared PVC (ReadWriteMany)
      is unsafe for the current ChromaDB persistence model because the
      embedded SQLite WAL can be corrupted under concurrent writes,
      especially during ingest_documents calls (T2-INGEST). For this plan,
      the supported default deployment is a single replica backed by a
      ReadWriteOnce PVC.
    mitigation: >
      1. Default the Kubernetes deployment to a single replica
         (min: 1, max: 1) with a ReadWriteOnce PVC.
      2. Document prominently that horizontal scaling is not supported while
         ChromaDB is running in embedded/SQLite mode.
      3. Only enable multi-replica deployments after migrating ChromaDB to
         its HTTP API mode (Chroma server), which is the prerequisite for
         safe horizontal scaling.
    contingency: >
      If there is any uncertainty in testing or implementation, fail closed
      by keeping the Kubernetes manifest at a single replica with
      ReadWriteOnce storage and treat multi-replica support as blocked until
      Chroma server mode is implemented and validated.

  - id: R3
    title: "Token-based auth insufficient for multi-tenant deployments"
    probability: low
    impact: medium
    affected_tasks: [T1-AUTH]
    description: >
      A single shared MCP_AUTH_TOKEN provides no per-user identity or
      audit trail.  If the system needs to serve multiple tenants, a
      shared secret is not sufficient.
    mitigation: >
      Implement T1-AUTH with a clean abstraction (AuthProvider interface)
      so that a future JWT-based provider can replace the static token
      without changing the middleware integration point.
    contingency: >
      Document clearly that the static token model is suitable only for
      single-tenant or internal deployments.  Create a follow-up issue for
      JWT/OIDC support if multi-tenancy is required.

  - id: R4
    title: "Prometheus client adds significant startup latency"
    probability: low
    impact: low
    affected_tasks: [T2-METRICS]
    description: >
      The prometheus_client library initializes a global registry on import,
      which may slow server startup or conflict with test parallelism
      (shared global state across test workers).
    mitigation: >
      1. Use a lazily-initialized registry (create_registry_on_first_request).
      2. In tests, use a fresh CollectorRegistry() per test to avoid cross-
         test pollution.
    contingency: >
      If startup latency is measurable (> 200 ms), expose metrics via a
      separate sidecar (prometheus/node-exporter pattern) rather than
      instrumenting mcp_server.py directly.

  - id: R5
    title: "ingest_documents introduces data-loss risk on partial failure"
    probability: medium
    impact: high
    affected_tasks: [T2-INGEST]
    description: >
      ChromaDB's add() call may partially succeed if the batch is large
      and the process is interrupted mid-way.  This leaves the collection
      in an inconsistent state and poisons the corpus version token.
    mitigation: >
      1. Use ChromaDB's upsert() with deterministic IDs (SHA-256 of text)
         so re-runs are idempotent.
      2. Cap batch size at 50 documents; loop in smaller batches.
      3. Validate all documents before any ChromaDB calls (fail fast).
    contingency: >
      If idempotency is not achievable, add a pre-flight dry-run flag
      (dry_run: bool = False) to validate without writing, enabling
      callers to verify before committing.

# ─────────────────────────────────────────────────────────────────────────────
# PRE-MORTEM
# ─────────────────────────────────────────────────────────────────────────────
# Imagine it is 3 months after this plan was executed and the MCP server
# production deployment has failed.  What went wrong?

pre_mortem:
  scenario: >
    It is 2026-08-04.  The MCP HTTP server has been in production for six
    weeks.  A post-incident review reveals two simultaneous failures that
    brought the service down for 4 hours.

  failure_modes:

    - id: FM-1
      title: "Authentication bypass via OPTIONS preflight"
      description: >
        The auth middleware (T1-AUTH) correctly checks the Authorization header
        on POST /mcp requests, but CORS preflight OPTIONS requests were
        accidentally excluded from auth checks "to avoid CORS issues."
        An attacker discovered that sending a malformed MCP request with
        method=OPTIONS bypassed authentication entirely.
      root_cause: "Middleware excluded OPTIONS from auth without a security review."
      prevention:
        - "Require security review sign-off for any auth bypass condition."
        - "Add an integration test that sends OPTIONS with no token and asserts 401."
        - "Use a denylist-free auth approach: authenticate all methods, let CORS preflight use a dedicated unauthenticated /cors-preflight endpoint."

    - id: FM-2
      title: "ChromaDB corruption under K8s rolling update with shared PVC"
      description: >
        During a rolling deployment (T3-K8S), two pods briefly shared the same
        ReadWriteMany PVC.  The outgoing pod had an open SQLite WAL transaction
        when the incoming pod started writing.  The WAL became corrupted;
        ChromaDB raised sqlite3.DatabaseError on every subsequent query.
      root_cause: "ReadWriteMany PVC not safe for simultaneous ChromaDB writers (Risk R2 materialized)."
      prevention:
        - "Default K8s manifests to ReadWriteOnce PVC and single-replica deployment."
        - "Add a pre-upgrade hook that drains all in-flight queries before terminating the old pod (terminationGracePeriodSeconds: 60)."
        - "Add a startup probe that validates ChromaDB integrity before pod becomes Ready."
        - "Address R2 mitigation: migrate to Chroma HTTP server mode for multi-replica."

    - id: FM-3
      title: "Rate limiter state lost on pod restart — burst abuse"
      description: >
        The in-process rate limiter (T1-RATELIMIT) stores per-IP counters in
        a Python dict.  A pod crash-loop reset all counters every 30 seconds,
        effectively giving abusers unlimited burst capacity during instability.
      root_cause: "In-memory rate limit state is not durable and not shared across replicas."
      prevention:
        - "Document clearly that in-process rate limiting is best-effort (not cryptographically enforced)."
        - "For production multi-replica deployments, offload rate limiting to the ingress layer (nginx, Kong, AWS API Gateway)."
        - "Add a Redis-backed rate limit option (reuse existing Redis infrastructure from L1 cache)."

    - id: FM-4
      title: "Health endpoint false-positive — unhealthy pods declared ready"
      description: >
        The /health endpoint (T2-HEALTH) returned 200 as soon as the retriever
        object was assigned, even before the ChromaDB collection metadata was
        fully loaded.  The Kubernetes readiness probe marked pods Ready while
        the first few query requests were still failing with 'collection not found'.
      root_cause: "Readiness ≠ liveness: the health check did not probe ChromaDB reachability."
      prevention:
        - "Health check must execute a ChromaDB heartbeat call (collection.count()) to confirm DB is responsive."
        - "Add a separate liveness probe (basic ping) vs. readiness probe (full ChromaDB check)."
        - "Test the health endpoint after simulating ChromaDB unavailability."

# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL CONSTRAINTS
# ─────────────────────────────────────────────────────────────────────────────

constraints:
  - "Each task modifies ≤ 3 files"
  - "Each changed file must remain ≤ 300 lines after the task is complete (excluding test files which may be longer)"
  - "All new code must pass: uv run ruff check . && pytest tests/ -v"
  - "Type hints required on all new functions (mypy mcp_server.py passes)"
  - "No bare except Exception blocks except at fail-open cache boundaries"
  - "Google-style docstrings on all new public functions"
  - "No print() statements — use logger"
  - "__all__ updated in hybrid_rag/__init__.py if any new public symbols are added"

quality_gates:
  per_task:
    - "uv run ruff check . — zero errors"
    - "pytest tests/ -v — 100% pass rate"
    - "mypy mcp_server.py — zero errors"
  per_wave:
    - "pytest tests/ -v --cov=mcp_server — ≥ 80% coverage"
  on_completion:
    - "All acceptance criteria checked off"
    - "spec/mcp-implementation-status.md updated to reflect completed tasks"
    - "docs/CHANGELOG.md updated"
