    acceptance_criteria:
      - "GET /metrics returns 200 with Content-Type text/plain"
      - "mcp_requests_total increments on each tool call"
      - "mcp_cache_operations_total increments on cache hit/miss/error"
      - "Endpoint exempt from auth middleware"
      - "New test file contains ≥ 4 tests: endpoint reachable, counter increment, histogram present, no auth required"
      - "`uv run ruff check .` and `mypy mcp_server.py` pass"
      - "prometheus_client added to pyproject.toml dependencies"

  - id: T2-TRACING
    title: "OpenTelemetry distributed tracing"
    phase: wave-2
    priority: medium
    status: pending
    estimated_effort: "2–3 days"
    depends_on:
