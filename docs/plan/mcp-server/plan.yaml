      invariants:
        - "Tracing is opt-in (no env var → no overhead)"
        - "Span attributes never contain raw query text (privacy)"
        - "Span status=ERROR only when an exception propagates to the caller"

    acceptance_criteria:
      - "When OTEL_EXPORTER_OTLP_ENDPOINT is set, spans are created for each tool call"
      - "Span attributes include tool name, cache_hit boolean, result_count"
      - "Span attributes do NOT include raw query text"
      - "When env var is absent, no OTEL SDK initialization occurs"
      - "New test file contains ≥ 4 tests using in-memory exporter"
      - "opentelemetry-sdk and opentelemetry-exporter-otlp added to pyproject.toml"
