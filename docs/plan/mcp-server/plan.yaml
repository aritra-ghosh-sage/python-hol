tasks:

  # ───────────────────────────── Wave 1: Security ───────────────────────────

  - id: T1-AUTH
    title: "HTTP transport authentication (JWT / API key)"
    phase: wave-1
    priority: critical
    status: pending
    estimated_effort: "2–3 days"
    depends_on:
      - T0-CORE        # needs the running server to attach middleware to
    files:
      - mcp_server.py          # add auth middleware / dependency
      - tests/test_mcp_auth.py # new test file
    file_count: 2
    description: >
      Add Bearer-token authentication for the streamable-HTTP transport.
      Stdio transport remains unauthenticated (process-level isolation is
      sufficient for local use).

    contract:
      inputs:
        - name: MCP_AUTH_TOKEN
          type: "env var (string)"
          description: "Secret bearer token; if unset or empty, HTTP transport fails closed and rejects requests."
        - name: MCP_AUTH_DISABLED
          type: "env var (boolean)"
          description: "Optional explicit local-dev override to disable HTTP auth; must only be honored for localhost-bound development."
        - name: Authorization header
          type: "HTTP header"
          format: "Bearer <token>"
      outputs:
        - "HTTP 401 on missing or invalid token"
        - "HTTP 401 when MCP_AUTH_TOKEN is unset or empty and auth is not explicitly disabled"
        - "HTTP 200 pass-through when token matches MCP_AUTH_TOKEN"
        - "Stdio transport: no change (auth bypass preserved)"
      invariants:
        - "Token stored only in environment variable, never in source code"
        - "Token comparison uses hmac.compare_digest() to prevent timing attacks"
        - "HTTP transport fails closed by default when auth configuration is missing or invalid"
        - "Any MCP_AUTH_DISABLED path must be explicit and restricted to localhost-only development usage"
        - "Stdio transport is never gated by auth checks"

    acceptance_criteria:
      - "Bearer token middleware rejects requests with missing/wrong token (HTTP 401)"
      - "Valid token allows access (HTTP 200)"
      - "Stdio transport unaffected"
      - "MCP_AUTH_TOKEN='' or unset → server rejects HTTP requests by default (fail closed)"
      - "Auth may be disabled only when MCP_AUTH_DISABLED=true, and that override is restricted to localhost-only development usage"
      - "All existing tests pass unchanged"
      - "New test file contains ≥ 6 tests covering: missing token, wrong token, valid token, unset token fail-closed behavior, explicit local-dev auth-disabled path, stdio bypass"
      - "`uv run ruff check .` passes, `mypy mcp_server.py` passes"

    implementation_notes: >
      Use a FastMCP middleware hook (or Starlette middleware if FastMCP exposes
      the underlying ASGI app) to intercept HTTP requests before they reach the
      tool dispatcher. Keep middleware logic in a standalone function so it can
      be unit-tested independently of the server lifecycle.

  - id: T1-RATELIMIT
    title: "Per-IP / per-token rate limiting for HTTP transport"
    phase: wave-1
    priority: critical
    status: pending
    estimated_effort: "1 day"
    depends_on:
      - T1-AUTH        # rate-limit key uses authenticated identity when available
    files:
      - mcp_server.py
      - tests/test_mcp_ratelimit.py
    file_count: 2
    description: >
      Enforce request quotas on the HTTP transport to prevent abuse.
      Default: 60 requests / minute / IP.  Configurable via env vars.

    contract:
      inputs:
        - name: MCP_RATE_LIMIT_RPM
          type: "env var (int, default 60)"
          description: "Max requests per minute per client IP."
        - name: MCP_RATE_LIMIT_BURST
          type: "env var (int, default 10)"
          description: "Burst allowance above RPM."
      outputs:
        - "HTTP 429 with Retry-After header when limit exceeded"
        - "Requests within quota processed normally"
        - "Stdio transport: no rate limiting applied"
      invariants:
        - "Rate limiter state is in-process (no Redis dependency for limits)"
        - "Burst allowance does not exceed 5× RPM"
        - "Stdio transport always bypasses the limiter"

    acceptance_criteria:
      - "Exceeding RPM returns HTTP 429 with Retry-After header"
      - "Requests within quota return HTTP 200"
      - "MCP_RATE_LIMIT_RPM env var overrides default"
      - "Stdio transport unaffected"
      - "All existing tests pass unchanged"
      - "New test file contains ≥ 4 tests: under-limit, at-limit, over-limit, env-var override"
      - "`uv run ruff check .` and `mypy mcp_server.py` pass"

  # ─────────────── Wave 2: Observability & Additional Tools ────────────────

  - id: T2-HEALTH
    title: "Health check endpoint (/health)"
    phase: wave-2
    priority: high
    status: pending
    estimated_effort: "0.5 days"
    depends_on:
      - T0-CORE
    files:
      - mcp_server.py
      - tests/test_mcp_health.py
    file_count: 2
    description: >
      Add a lightweight GET /health HTTP endpoint that reports liveness and
      readiness (retriever initialized, cache backend reachable).
      Required by Docker and Kubernetes health probes.

    contract:
      inputs:
        - "None (unauthenticated — liveness probes must not require tokens)"
      outputs:
        - name: healthy response
          type: "JSON"
          schema: >
            {
              "status": "ok",
              "retriever_initialized": true,
              "cache_backend": "memory|redis|none",
              "collection_name": "<string>",
              "corpus_version": "<string>"
            }
          http_status: 200
        - name: unhealthy response
          type: "JSON"
          schema: >
            {
              "status": "error",
              "detail": "<reason>"
            }
          http_status: 503
      invariants:
        - "Endpoint responds in < 100 ms"
        - "Does not trigger retrieval pipeline"
        - "Available only on HTTP transport (no-op for stdio)"

    acceptance_criteria:
      - "GET /health returns 200 + JSON when retriever is initialized"
      - "GET /health returns 503 + JSON when retriever is not initialized"
      - "Response includes retriever_initialized, cache_backend, corpus_version"
      - "Endpoint is exempt from authentication middleware (T1-AUTH)"
      - "New test file contains ≥ 3 tests: healthy, unhealthy, fields present"
      - "`uv run ruff check .` and `mypy mcp_server.py` pass"

  - id: T2-METRICS
    title: "Prometheus metrics exposition"
    phase: wave-2
    priority: medium
    status: pending
    estimated_effort: "1–2 days"
    depends_on:
      - T2-HEALTH      # reuses the HTTP transport setup validated in T2-HEALTH
    files:
      - mcp_server.py
