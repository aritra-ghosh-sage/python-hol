  - id: T2-INGEST
    title: "ingest_documents MCP tool"
    phase: wave-2
    priority: medium
    status: pending
    estimated_effort: "3–4 days"
    depends_on:
      - T0-CORE
    files:
      - mcp_server.py
      - tests/test_mcp_ingest.py
    file_count: 2
    description: >
      Add an `ingest_documents` MCP tool that allows callers to upload plain
      text documents directly via the MCP protocol.  Performs chunking,
      embedding, and ChromaDB ingestion, then invalidates the L1 cache.

    contract:
      inputs:
        - name: documents
          type: "list[dict]"
          schema: >
            [
              {
                "text": "<string, required, 1-10000 chars>",
                "source": "<string, required>",
                "source_url": "<string, optional>"
              }
            ]
          max_items: 100
      outputs:
        - name: ingestion result
          type: "dict"
          schema: >
            {
              "ingested_count": <int>,
              "collection_name": "<string>",
              "corpus_version": "<string>"
            }
      invariants:
        - "Empty documents list raises ValueError"
        - "Individual documents exceeding 10 000 chars are rejected"
        - "_cache_generation is incremented after successful ingestion"
        - "_corpus_version is recalculated after ingestion"
        - "Tool is atomic: all documents ingested or none (ChromaDB batch add)"

    acceptance_criteria:
      - "Tool registered and discoverable via tools/list"
      - "Valid input returns ingested_count matching len(documents)"
      - "Empty list raises ValueError with descriptive message"
      - "Document text > 10 000 chars raises ValueError"
      - "_cache_generation incremented after ingestion (cache busted)"
