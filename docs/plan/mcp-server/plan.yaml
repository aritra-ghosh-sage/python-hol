      - "`uv run ruff check .` and `mypy mcp_server.py` pass"

  - id: T2-UPDATE-CONFIG
    title: "update_config MCP tool"
    phase: wave-2
    priority: low
    status: pending
    estimated_effort: "1 day"
    depends_on:
      - T0-CORE
    files:
