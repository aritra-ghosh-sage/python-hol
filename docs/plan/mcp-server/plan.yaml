          type: "dict"
          valid_keys:
            - semantic_top_k (int, 1–50)
            - keyword_top_k (int, 1–50)
            - final_top_k (int, 1–20)
            - semantic_weight (float, 0.0–1.0)
            - keyword_weight (float, 0.0–1.0)
            - enable_rerank (bool)
            - pre_rerank_top_k (int, 1–50)
      outputs:
        - name: updated config
          type: "dict"
          description: "Full config dict after applying updates (mirrors get_config output)"
      invariants:
