      responsibility: "Provide one retrieval execution path for REST and WS with identical rerank, filtering, and cache-policy semantics."
      interfaces:
        - "retrieve_documents(query: str, enable_rerank: bool | None, transport: str) -> RetrievalResponse payload"
      dependencies:
        - component: "HybridRetriever"
          relationship: "Retrieval execution"
        - component: "Cache backend"
          relationship: "Optional response-cache access and invalidation"
      integration_points:
        - "POST /retrieve"
        - "WebSocket /ws/chat"
    - component: "Cache policy contract"
      responsibility: "Define and enforce keying, transport inclusion, and invalidation semantics across channels."
      interfaces:
        - "cache_key(query, enable_rerank, config_fingerprint, corpus_version, transport_policy)"
      dependencies:
        - component: "api_middleware QueryCacheMiddleware"
          relationship: "HTTP interception and response caching"
      integration_points:
        - "/retrieve middleware"
        - "WS retrieval handling"
    - component: "Concurrency-safe rerank override"
      responsibility: "Eliminate global mutable config toggles during request processing."
      interfaces:
        - "request-local rerank override input"
      dependencies:
        - component: "HybridRetriever configuration handling"
          relationship: "Execution policy"
      integration_points:
        - "REST retrieval handlers"
