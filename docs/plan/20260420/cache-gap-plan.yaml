plan_id: "20260420-cache-gap"
objective: "Close cache-flow architecture gaps from plan 20260420 by enforcing HTTP/WS cache parity, consistent invalidation semantics, and concurrency-safe retrieval execution"
created_at: "2026-04-21"
created_by: "gem-planner"
status: "completed"
research_confidence: "high"
plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 5
  risk_score: "high"
tldr: |
  The current implementation has channel divergence: REST uses L1 response cache while WebSocket bypasses it and calls the retriever directly.
  This plan introduces a shared retrieval facade and cache policy contract so REST and WS behave consistently, then hardens middleware
  request eligibility and removes request-time mutation of global config that can corrupt behavior under concurrency.
open_questions:
  - question: "Should WS share the exact same L1 response cache as /retrieve, or remain uncached with explicit product-level acceptance of divergence?"
    context: "This decision affects latency, consistency, and cache hit-rate semantics across channels."
    type: "decision_blocker"
    affects: ["CACHE-PARITY-IMPLEMENT", "CACHE-PARITY-TESTS"]
  - question: "For ingest_type=add, should previous query answers be treated as eventually consistent or immediately invalidated?"
    context: "Current behavior can produce stale REST hits while WS may return fresh data."
    type: "decision_blocker"
    affects: ["CACHE-CONSISTENCY-POLICY", "CACHE-PARITY-IMPLEMENT"]
gaps:
  - description: "No explicit architecture contract defines cross-channel cache consistency between REST and WS."
    refinement_requests:
      - query: "Find explicit product requirement for consistency guarantees between REST and chat transport."
        source_hint: "docs/PRD.yaml or docs/plan artifacts"
  - description: "No existing tests assert parity (or justified non-parity) between REST and WS retrieval paths."
    refinement_requests:
      - query: "Identify expected cache behavior contract for WS in tests and docs."
        source_hint: "tests/ and docs/CACHE_*.md"
pre_mortem:
