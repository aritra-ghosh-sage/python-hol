      mitigation: "Adopt explicit JSON media-type allowlist with tests for application/json and +json variants."
  assumptions:
    - "REST endpoint /retrieve remains the canonical external retrieval API."
    - "Backward-compatible WS message contract is required."
    - "Fail-open behavior for cache runtime failures must be preserved."
implementation_specification:
  code_structure: "Introduce a transport-agnostic retrieval service layer with cache policy hooks, then route REST and WS through it; add tests and docs to enforce one parity contract."
  affected_areas:
