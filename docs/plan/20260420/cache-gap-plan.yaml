    - scenario: "Concurrency defects remain due to global config mutation for enable_rerank overrides."
      likelihood: "high"
      impact: "critical"
      mitigation: "Remove global config mutation; pass rerank mode as request-local execution parameter."
    - scenario: "Cache hardening rejects valid JSON requests with charset or vendor media type variants."
      likelihood: "medium"
