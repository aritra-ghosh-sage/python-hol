  Remediate blocking security items SEC-001, SEC-002, and SEC-004 for staging readiness,
  with SEC-003 explicitly deferred. The plan prioritizes: (1) canonical cache-key identity,
  (2) strict request-type bypass in middleware to prevent upload/non-JSON cache-path abuse,
  and (3) defense-in-depth Redis production transport/auth enforcement at direct backend
  initialization. Validation is gated by targeted regression tests and a security-focused
  staging-readiness review.
