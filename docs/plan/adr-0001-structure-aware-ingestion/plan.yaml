  - id: T2-metadata-fix
    title: "Fix source_url and chunk_index metadata in initialize_vector_db()"
    description: |
      Edit the document loop in initialize_vector_db() (vectordb.py:201-212) to mirror
      the metadata shape produced by api.py:1649-1655.

      Specific changes in vectordb.py:
        1. Add `from urllib.parse import urlparse` to imports at the top of file.
        2. Inside the `for doc in documents:` loop, after computing chunks:
           - Parse doc["source"] with urlparse; if scheme in ("http", "https") and
             netloc is non-empty, add source_url: doc["source"] to metadata.
           - Add chunk_index: i (per-chunk loop variable) to metadata.
        3. Metadata dict shape after change:
             {"source": doc["source"], "text": doc["text"].strip(),
              "chunk_index": i, "source_url": source_url}  # source_url key omitted if not a URL

      The variable `i` must be the chunk-level counter (currently `id_counter`) or a
      per-doc chunk index. Use a per-doc chunk index (reset to 0 for each new doc)
      named `chunk_idx` to match api.py semantics. The global `id_counter` remains for
      generating unique doc_ids.

      Do NOT change the function signature or return type.
