plan_id: adr-0001-structure-aware-ingestion
objective: >
  Implement ADR-0001: Structure-Aware Document Ingestion — fix chunk_size bug (500→400),
  fix source_url/chunk_index metadata gap in initialize_vector_db(), implement
  chunk_document() routing function, wire it into both ingestion paths with heading
  metadata, replace _TextExtractor with HTMLSectionSplitter for URL ingestion, and
  upgrade DEFAULT_EMBEDDING_MODEL to BAAI/bge-small-en-v1.5.
created_at: "2026-04-29"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 5
  risk_score: medium

tldr: |
  Five coordinated changes to hybrid_rag/vectordb.py, hybrid_rag/constants.py, and
  api.py. Wave 1 fixes are independent (chunk_size constant, metadata gap, embedding
  model constant). Wave 2 builds the chunk_document() routing function only after the
  metadata fix is in place (so both ingestion paths share the correct metadata shape
  from the moment wiring happens). Wave 3 wires chunk_document() into both call sites
  and replaces _TextExtractor. Wave 4 adds documentation. All tasks are Python-only;
  no frontend or new runtime dependencies.

open_questions: []

gaps: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: >
        chunk_document() returns plain strings for Markdown/HTML but initialize_vector_db()
        expects strings — OK. However, if MarkdownHeaderTextSplitter produces Document
        objects (LangChain Document), calling .page_content is required; returning the
        raw object would cause ChromaDB to reject the input.
      likelihood: medium
      impact: high
      mitigation: >
        In chunk_document(), always extract .page_content from Document objects before
        returning. Add an explicit unit test asserting return type is list[str].

    - scenario: >
        HTMLSectionSplitter requires the input to be valid HTML. If the URL path returns
        plain text or a non-HTML content-type, HTMLSectionSplitter may raise or return
        empty chunks. The original _TextExtractor handled any text gracefully.
      likelihood: medium
      impact: medium
      mitigation: >
        In chunk_document(), wrap HTMLSectionSplitter in a try/except; fall back to
        RecursiveCharacterTextSplitter on failure. Add a test with plain-text input
        routed via HTML path to verify the fallback activates.

    - scenario: >
        Changing DEFAULT_EMBEDDING_MODEL from all-MiniLM-L6-v2 to BAAI/bge-small-en-v1.5
        invalidates the L2 LRU embedding cache in retriever.py on restart (expected) but
        also invalidates any existing ChromaDB collection on disk whose vectors were
        produced by the old model. Any test that re-opens an existing collection without
        re-running initialize_vector_db() will query against wrong-model vectors.
      likelihood: low
      impact: medium
      mitigation: >
        Tests that open existing collections must re-initialize (already gated by
        pytest.skip on model unavailability). Document in task that existing collections
        must be re-embedded after this change is deployed.

    - scenario: >
        Reducing chunk_size from 500 to 400 changes the default parameter value of the
        public chunk_text() API. Any caller that relied on the 500-character default
        without passing chunk_size explicitly will get different chunk counts after this
        change.
      likelihood: low
      impact: low
      mitigation: >
        Audit all call sites before changing the default. The only confirmed call sites
        are api.py:1630 (passes 500 explicitly — must change to 400) and
        vectordb.py:205 (calls chunk_text() with no args — will use new default 400).
        Both are in scope for this ADR. Update docstring to reflect new default.

  assumptions:
    - langchain_text_splitters.MarkdownHeaderTextSplitter and HTMLSectionSplitter
      are available in the installed langchain-text-splitters>=1.1.1 package.
    - MarkdownHeaderTextSplitter and HTMLSectionSplitter return LangChain Document
      objects with a .page_content attribute (standard LangChain interface).
    - BAAI/bge-small-en-v1.5 outputs 384-dim vectors (same as all-MiniLM-L6-v2),
      confirmed by ADR model comparison table — no HNSW schema migration needed.
    - All current tests pass (100%) before this work begins; no pre-existing failures
      will mask regressions.

implementation_specification:
  code_structure: |
    Change 1 (chunk_size default): single-line edit in chunk_text() signature in
    hybrid_rag/vectordb.py (line 31) and explicit 500→400 in api.py:1630.

    Change 2 (metadata fix): edit initialize_vector_db() loop body (vectordb.py:205-211)
    to add chunk_index=i and conditionally add source_url by parsing doc["source"] with
    urllib.parse.urlparse. Mirror the pattern already at api.py:1649-1655.

    Change 3 (chunk_document): new function in hybrid_rag/vectordb.py, added to __all__
    and re-exported from hybrid_rag/__init__.py. Dispatch: source_hint ending .md →
    MarkdownHeaderTextSplitter → RecursiveCharacterTextSplitter size-cap; source_hint
    starting http:// or https:// → HTMLSectionSplitter → RecursiveCharacterTextSplitter
    size-cap; else RecursiveCharacterTextSplitter only. Returns list[str] always.
    Includes Google-style docstring and full type hints.

    Change 4 (wiring): replace chunk_text() at api.py:1630 with chunk_document() passing
    source_hint=request.content (URL) or source_hint=request.filename (file). In
    vectordb.py:205 replace chunk_text() with chunk_document() passing
    source_hint=doc.get("source", ""). For Markdown/HTML chunks, metadata dict gains
    section_h1 and section_h2 fields from Document metadata. Replace _TextExtractor
    class (api.py:1563-1584) with HTMLSectionSplitter call; raw HTML from response.text
    feeds directly into chunk_document(source_hint=url). Remove HTMLParser import if no
    longer used.

    Change 5 (embedding model): single-line edit in hybrid_rag/constants.py line 15.

  affected_areas:
    - hybrid_rag/vectordb.py
    - hybrid_rag/constants.py
    - hybrid_rag/__init__.py
    - api.py

  component_details:
    - component: chunk_text() in hybrid_rag/vectordb.py
      responsibility: >
        Public API, backward-compatible. Default chunk_size changes 500→400.
        All existing callers that pass chunk_size explicitly are unaffected.
      interfaces:
        - "chunk_text(text: str, chunk_size: int = 400, chunk_overlap: int = 50) -> list[str]"
      dependencies:
        - component: RecursiveCharacterTextSplitter
          relationship: wraps
      integration_points:
        - "Exported in __all__ of vectordb.py and hybrid_rag/__init__.py"
        - "Direct call in api.py removed in Change 4 (replaced by chunk_document)"
        - "Direct call in initialize_vector_db() removed in Change 4 (replaced by chunk_document)"

    - component: initialize_vector_db() in hybrid_rag/vectordb.py
      responsibility: >
        Bulk ingestion path. After Change 2, writes chunk_index and source_url
        into every chunk's ChromaDB metadata. After Change 4, delegates to
        chunk_document() for format-aware splitting.
      interfaces:
        - "initialize_vector_db(documents, persist_dir, collection_name) -> Collection"
      dependencies:
        - component: chunk_document()
          relationship: calls (after Change 4)
        - component: urlparse from urllib.parse
          relationship: uses for source_url extraction (Change 2)
      integration_points:
        - "ChromaDB metadata shape must match api.py add_documents() path"

    - component: chunk_document() in hybrid_rag/vectordb.py
      responsibility: >
        New routing function. Dispatches to format-specific LangChain splitters then
        applies RecursiveCharacterTextSplitter as size cap. Returns list[str] always.
        Extracts section_h1/section_h2 from Document metadata for callers that need
        heading context (returned as separate list[dict] or embedded in return value
        — see task spec for chosen interface).
      interfaces:
        - "chunk_document(text: str, source_hint: str, chunk_size: int = 400, chunk_overlap: int = 50) -> list[dict[str, Any]]"
      dependencies:
        - component: MarkdownHeaderTextSplitter
          relationship: uses for .md dispatch
        - component: HTMLSectionSplitter
          relationship: uses for URL/HTML dispatch
        - component: RecursiveCharacterTextSplitter
          relationship: uses as fallback and size-cap
      integration_points:
        - "Called by initialize_vector_db() (bulk path)"
        - "Called by add_documents() in api.py (single-document path)"
        - "Exported in __all__ of vectordb.py and hybrid_rag/__init__.py"

    - component: _TextExtractor in api.py
      responsibility: >
        HTML text extraction for URL ingestion. Replaced by HTMLSectionSplitter
        in Change 4. The class definition and HTMLParser import are removed.
      interfaces: []
      dependencies: []
      integration_points:
        - "api.py URL ingestion path (lines 1563-1584) — removed in Change 4"

    - component: DEFAULT_EMBEDDING_MODEL in hybrid_rag/constants.py
      responsibility: >
        Constant consumed by initialize_vector_db() and open_collection() in vectordb.py
        to select the SentenceTransformer model. Changed from all-MiniLM-L6-v2 to
        BAAI/bge-small-en-v1.5.
      interfaces:
        - "DEFAULT_EMBEDDING_MODEL: str = 'BAAI/bge-small-en-v1.5'"
      dependencies: []
      integration_points:
        - "hybrid_rag/vectordb.py (initialize_vector_db, open_collection)"
        - "Exported in __all__ of constants.py and hybrid_rag/__init__.py"

contracts:
  - from_task: T2-metadata-fix
    to_task: T4-wire-chunk-document
    interface: >
      initialize_vector_db() after T2 writes chunk metadata with keys:
      {source: str, chunk_index: int, source_url: str (conditional)}.
      T4 wiring relies on this shape being correct before it adds section_h1/section_h2
      for Markdown and HTML chunks.
    format: "dict[str, str | int] per ChromaDB metadata contract"

  - from_task: T3-chunk-document-impl
    to_task: T4-wire-chunk-document
    interface: >
      chunk_document() returns list[dict[str, Any]] where each dict has at minimum
      keys: {text: str, metadata: dict}. metadata may include section_h1 and section_h2
      for Markdown/HTML paths. T4 unpacks this to build ChromaDB doc_texts and
      doc_metadatas lists.
    format: "list[dict[str, Any]] — each item: {text: str, metadata: dict[str, str]}"

