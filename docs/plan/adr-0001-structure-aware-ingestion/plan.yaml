  # ─── WAVE 2: chunk_document() implementation (depends on T2 for metadata contract) ───

  - id: T3-chunk-document-impl
    title: "Implement chunk_document() routing function in vectordb.py"
    description: |
      Add `chunk_document()` to hybrid_rag/vectordb.py. Add it to __all__ in vectordb.py
      and re-export it from hybrid_rag/__init__.py __all__.

      Function signature:
        def chunk_document(
            text: str,
            source_hint: str,
            chunk_size: int = 400,
            chunk_overlap: int = 50,
        ) -> list[dict[str, Any]]:

      Return type: list[dict[str, Any]] where each dict is:
        {"text": str, "metadata": {"section_h1": str, "section_h2": str}}
      For plain-text/PDF paths, metadata is an empty dict {}.
      This allows callers to merge heading fields into ChromaDB metadata selectively.

      Dispatch logic (check in order):
        1. source_hint.lower().endswith(".md") → Markdown path
        2. source_hint.lower().startswith(("http://", "https://")) → HTML/URL path
        3. Everything else (including .pdf, .txt, raw text) → plain path

      Markdown path:
        - headers_to_split_on = [("#", "section_h1"), ("##", "section_h2")]
        - md_splitter = MarkdownHeaderTextSplitter(headers_to_split_on=headers_to_split_on,
            strip_headers=False)
        - md_docs = md_splitter.split_text(text)
        - size_splitter = RecursiveCharacterTextSplitter(chunk_size=chunk_size,
            chunk_overlap=chunk_overlap)
        - For each doc in md_docs: further split doc.page_content; carry forward
          doc.metadata (section_h1, section_h2) to each sub-chunk.
        - Return list of {"text": chunk_str, "metadata": {k: v for k, v in
            doc.metadata.items() if k in ("section_h1", "section_h2")}}.

      HTML/URL path:
        - headers_to_split_on = [("h1", "section_h1"), ("h2", "section_h2")]
        - html_splitter = HTMLSectionSplitter(headers_to_split_on=headers_to_split_on)
        - Try: html_docs = html_splitter.split_text(text)
        - Except any exception: fall back to plain path (log warning).
        - Apply size cap with RecursiveCharacterTextSplitter as in Markdown path.

      Plain path:
        - size_splitter = RecursiveCharacterTextSplitter(chunk_size=chunk_size,
            chunk_overlap=chunk_overlap)
        - chunks = size_splitter.split_text(text)
        - Return [{"text": c, "metadata": {}} for c in chunks]

      Add required imports to vectordb.py:
        from langchain_text_splitters import (
            MarkdownHeaderTextSplitter,
            HTMLSectionSplitter,
        )
      (RecursiveCharacterTextSplitter is already imported.)
      Add `from typing import Any` if not already present (currently `from typing import cast`
      — add Any to the same import line).

      Google-style docstring required: Args, Returns, Raises, Example sections.
      Preserve the existing chunk_text() — do not modify it.
    wave: 2
    agent: gem-implementer
    prototype: false
    covers:
      - "ADR Change 1: chunk_document() routing function"
      - "ADR IMP-001: chunk_document implementation spec"
    priority: high
    status: pending
    flags:
      flaky: false
      retries_used: 0
    dependencies:
      - T2-metadata-fix
    conflicts_with: []
    context_files:
      - path: hybrid_rag/vectordb.py
        description: "Existing imports, chunk_text(), __all__ — add chunk_document() here"
      - path: hybrid_rag/__init__.py
        description: "Add chunk_document to __all__ and import from .vectordb"
    estimated_effort: medium
    estimated_files: 2
    estimated_lines: 90
    focus_area: "hybrid_rag/vectordb.py — new function, imports, __all__"
    tech_stack: ["Python 3.13", "langchain-text-splitters>=1.1.1"]
    test_coverage: >
      Add tests/test_chunk_document.py with class TestChunkDocument:
        - test_md_path_splits_on_headers: input has # H1 and ## H2 markers; assert
          section_h1 and section_h2 appear in metadata of returned dicts.
        - test_html_path_splits_on_headings: input is minimal valid HTML with <h1> and
          <h2> tags; assert section_h1/section_h2 in metadata.
        - test_html_fallback_on_invalid_html: input is plain text routed via http://
          source_hint; assert returns list[dict] without raising.
        - test_plain_path_returns_empty_metadata: .txt source_hint; assert metadata == {}.
        - test_pdf_path_returns_empty_metadata: .pdf source_hint; assert metadata == {}.
        - test_return_type_is_list_of_dicts: all paths return list[dict] with "text" key.
        - test_chunk_size_respected: long input with plain path; assert max(len(d["text"])
          for d in result) <= chunk_size + chunk_overlap.
    requires_review: false
    review_depth: standard
    review_security_sensitive: false
    verification:
      - "uv run ruff check . passes"
      - "pytest tests/test_chunk_document.py -v passes all cases"
      - "pytest tests/ -v passes (100%)"
      - "chunk_document in hybrid_rag.__all__"
    acceptance_criteria:
      - "chunk_document() is defined in hybrid_rag/vectordb.py and added to __all__"
      - "chunk_document() is re-exported from hybrid_rag/__init__.py"
      - "Markdown dispatch: section_h1/section_h2 fields present in metadata for .md source"
      - "HTML dispatch: section_h1/section_h2 fields present in metadata for http/https source"
      - "HTML fallback: plain text input via HTML path does not raise; returns chunked dicts"
      - "Plain dispatch: metadata dict is empty for .txt / .pdf / raw source_hint"
      - "Return type is list[dict[str, Any]] always"
      - "chunk_text() is unchanged (public API preserved)"
      - "Google-style docstring present with Args, Returns, Raises, Example"
      - "Type hints on all parameters and return"
    failure_modes:
      - scenario: >
          LangChain Document objects returned by MarkdownHeaderTextSplitter may not have
          .metadata attribute populated if no headers are found in the input.
        likelihood: low
        impact: medium
        mitigation: >
          Default to empty dict when doc.metadata is None or missing keys:
          doc.metadata.get("section_h1", None) — omit key if None so ChromaDB
          metadata stays clean.
      - scenario: >
          HTMLSectionSplitter is unavailable in the installed langchain-text-splitters
          version (was added in 0.2.x / requires specific version).
        likelihood: low
        impact: high
        mitigation: >
          Verify availability with: from langchain_text_splitters import HTMLSectionSplitter.
          The pyproject.toml pins >=1.1.1 which includes this class. If import fails at
          test time, investigate version; do not add a try/except that silently swallows
          ImportError.

  # ─── WAVE 3: Wire chunk_document() into both ingestion paths ──────────────

  - id: T4-wire-chunk-document
    title: "Wire chunk_document() into both ingestion paths and replace _TextExtractor"
    description: |
      Three coordinated edits in one task (all in api.py and vectordb.py):

      Edit 1 — vectordb.py initialize_vector_db() bulk path:
        Replace:
